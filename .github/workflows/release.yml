name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            fakeroot

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build .deb
        run: |
          PKG=pulsar-mouse-linux
          VER=$VERSION
          ARCH=all
          DIR="${PKG}_${VER}_${ARCH}"

          # Package tree
          mkdir -p "${DIR}/DEBIAN"
          mkdir -p "${DIR}/usr/local/bin"
          mkdir -p "${DIR}/usr/share/applications"
          mkdir -p "${DIR}/etc/udev/rules.d"

          # Python package
          PKG_DIR="${DIR}/usr/lib/python3/dist-packages/pulsar_mouse"
          DRIVERS_DIR="${PKG_DIR}/drivers"
          mkdir -p "${DRIVERS_DIR}"

          install -m 644 src/pulsar_mouse/__init__.py  "${PKG_DIR}/"
          install -m 644 src/pulsar_mouse/base.py      "${PKG_DIR}/"
          install -m 644 src/pulsar_mouse/hid.py       "${PKG_DIR}/"
          install -m 644 src/pulsar_mouse/cli.py       "${PKG_DIR}/"
          install -m 644 src/pulsar_mouse/gui.py       "${PKG_DIR}/"
          install -m 644 src/pulsar_mouse/drivers/__init__.py "${DRIVERS_DIR}/"
          install -m 644 src/pulsar_mouse/drivers/x2a.py     "${DRIVERS_DIR}/"
          install -m 644 src/pulsar_mouse/drivers/x2h.py     "${DRIVERS_DIR}/"
          install -m 644 src/pulsar_mouse/drivers/xlite_v4.py "${DRIVERS_DIR}/"
          install -m 644 src/pulsar_mouse/drivers/nordic.py  "${DRIVERS_DIR}/"

          # CLI entry point
          cat > "${DIR}/usr/local/bin/pulsar-mouse" << 'SCRIPT'
          #!/usr/bin/env python3
          from pulsar_mouse.cli import main
          main()
          SCRIPT
          chmod 755 "${DIR}/usr/local/bin/pulsar-mouse"

          # GUI entry point
          cat > "${DIR}/usr/local/bin/pulsar-mouse-gui" << 'SCRIPT'
          #!/usr/bin/env python3
          from pulsar_mouse.gui import main
          main()
          SCRIPT
          chmod 755 "${DIR}/usr/local/bin/pulsar-mouse-gui"

          # udev rules
          install -m 644 udev/50-pulsar-mouse.rules \
            "${DIR}/etc/udev/rules.d/50-pulsar-mouse.rules"

          # Desktop entry + icon
          install -m 644 data/pulsar-mouse.desktop \
            "${DIR}/usr/share/applications/pulsar-mouse.desktop"
          mkdir -p "${DIR}/usr/share/icons/hicolor/scalable/apps"
          install -m 644 data/pulsar-mouse.svg \
            "${DIR}/usr/share/icons/hicolor/scalable/apps/pulsar-mouse.svg"

          # control file
          cat > "${DIR}/DEBIAN/control" << EOF
          Package: pulsar-mouse-linux
          Version: ${VER}
          Architecture: ${ARCH}
          Maintainer: packerlschupfer
          Depends: python3, python3-usb, python3-gi, gir1.2-gtk-4.0, gir1.2-adw-1, gir1.2-dbusmenu-glib-0.4
          Replaces: pulsar-x2a-linux
          Conflicts: pulsar-x2a-linux
          Description: Linux configuration tool for Pulsar gaming mice
           Plugin-based tool providing CLI and GTK4/libadwaita GUI for
           configuring Pulsar gaming mice. Supports multiple mouse models
           via device-specific protocol drivers.
          EOF

          # postinst: reload udev rules
          cat > "${DIR}/DEBIAN/postinst" << 'EOF'
          #!/bin/sh
          set -e
          udevadm control --reload-rules || true
          udevadm trigger || true
          EOF
          chmod 755 "${DIR}/DEBIAN/postinst"

          fakeroot dpkg-deb --build "${DIR}"
          echo "DEB_PATH=${DIR}.deb" >> "$GITHUB_ENV"

      - name: Upload .deb
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"

  build-tarball:
    name: Build tarball
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build tarball
        run: |
          DIR="pulsar-mouse-linux-${VERSION}"
          mkdir -p "$DIR"
          cp -r src/ udev/ data/ install.sh pyproject.toml README.md LICENSE "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - name: Upload tarball
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"

  build-rpm:
    name: Build .rpm package
    runs-on: ubuntu-24.04
    container: fedora:44

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y rpm-build

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build .rpm
        run: |
          PKG=pulsar-mouse-linux
          VER=$VERSION
          TOPDIR="$(pwd)/rpmbuild"
          SRC="$(pwd)"

          mkdir -p "${TOPDIR}"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          cat > "${TOPDIR}/SPECS/${PKG}.spec" << SPEC
          Name:           ${PKG}
          Version:        ${VER}
          Release:        1
          Summary:        Linux configuration tool for Pulsar gaming mice
          License:        MIT
          BuildArch:      noarch
          Requires:       python3, python3-pyusb, python3-gobject, gtk4, libadwaita

          %description
          Plugin-based tool providing CLI and GTK4/libadwaita GUI for
          configuring Pulsar gaming mice. Supports multiple mouse models
          via device-specific protocol drivers.

          %install
          SITE=%{buildroot}%{python3_sitelib}/pulsar_mouse
          install -d \${SITE}/drivers
          install -m 644 ${SRC}/src/pulsar_mouse/__init__.py  \${SITE}/
          install -m 644 ${SRC}/src/pulsar_mouse/base.py      \${SITE}/
          install -m 644 ${SRC}/src/pulsar_mouse/hid.py       \${SITE}/
          install -m 644 ${SRC}/src/pulsar_mouse/cli.py       \${SITE}/
          install -m 644 ${SRC}/src/pulsar_mouse/gui.py       \${SITE}/
          install -m 644 ${SRC}/src/pulsar_mouse/drivers/__init__.py \${SITE}/drivers/
          install -m 644 ${SRC}/src/pulsar_mouse/drivers/x2a.py     \${SITE}/drivers/
          install -m 644 ${SRC}/src/pulsar_mouse/drivers/x2h.py     \${SITE}/drivers/
          install -m 644 ${SRC}/src/pulsar_mouse/drivers/xlite_v4.py \${SITE}/drivers/
          install -m 644 ${SRC}/src/pulsar_mouse/drivers/nordic.py  \${SITE}/drivers/

          install -d %{buildroot}/usr/local/bin
          printf '#!/usr/bin/env python3\nfrom pulsar_mouse.cli import main\nmain()\n' > %{buildroot}/usr/local/bin/pulsar-mouse
          chmod 755 %{buildroot}/usr/local/bin/pulsar-mouse
          printf '#!/usr/bin/env python3\nfrom pulsar_mouse.gui import main\nmain()\n' > %{buildroot}/usr/local/bin/pulsar-mouse-gui
          chmod 755 %{buildroot}/usr/local/bin/pulsar-mouse-gui

          install -d %{buildroot}/etc/udev/rules.d
          install -m 644 ${SRC}/udev/50-pulsar-mouse.rules %{buildroot}/etc/udev/rules.d/

          install -d %{buildroot}/usr/share/applications
          install -m 644 ${SRC}/data/pulsar-mouse.desktop %{buildroot}/usr/share/applications/

          install -d %{buildroot}/usr/share/icons/hicolor/scalable/apps
          install -m 644 ${SRC}/data/pulsar-mouse.svg %{buildroot}/usr/share/icons/hicolor/scalable/apps/

          %files
          /usr/local/bin/pulsar-mouse
          /usr/local/bin/pulsar-mouse-gui
          %{python3_sitelib}/pulsar_mouse/
          /etc/udev/rules.d/50-pulsar-mouse.rules
          /usr/share/applications/pulsar-mouse.desktop
          /usr/share/icons/hicolor/scalable/apps/pulsar-mouse.svg

          %post
          udevadm control --reload-rules || true
          udevadm trigger || true
          SPEC

          rpmbuild --define "_topdir ${TOPDIR}" -bb "${TOPDIR}/SPECS/${PKG}.spec"
          cp "${TOPDIR}"/RPMS/noarch/*.rpm .

      - name: Upload .rpm
        uses: softprops/action-gh-release@v2
        with:
          files: "*.rpm"

  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3-pip

      - name: Build AppImage
        run: |
          set -e
          APP="Pulsar_Mouse"
          APPDIR="${APP}.AppDir"

          # Create AppDir structure
          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/lib"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          # Bundle full Python runtime (venv only symlinks stdlib — not portable)
          PYVER=$(python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
          cp /usr/bin/python3 "${APPDIR}/usr/bin/python3"
          cp -a "/usr/lib/python${PYVER}" "${APPDIR}/usr/lib/"

          # Install pyusb into the bundled stdlib
          SITE="${APPDIR}/usr/lib/python${PYVER}"
          pip install --target="${SITE}" --quiet pyusb

          mkdir -p "${SITE}/pulsar_mouse/drivers"
          cp src/pulsar_mouse/__init__.py  "${SITE}/pulsar_mouse/"
          cp src/pulsar_mouse/base.py      "${SITE}/pulsar_mouse/"
          cp src/pulsar_mouse/hid.py       "${SITE}/pulsar_mouse/"
          cp src/pulsar_mouse/cli.py       "${SITE}/pulsar_mouse/"
          cp src/pulsar_mouse/gui.py       "${SITE}/pulsar_mouse/"
          cp src/pulsar_mouse/drivers/__init__.py "${SITE}/pulsar_mouse/drivers/"
          cp src/pulsar_mouse/drivers/x2a.py     "${SITE}/pulsar_mouse/drivers/"
          cp src/pulsar_mouse/drivers/x2h.py     "${SITE}/pulsar_mouse/drivers/"
          cp src/pulsar_mouse/drivers/xlite_v4.py "${SITE}/pulsar_mouse/drivers/"
          cp src/pulsar_mouse/drivers/nordic.py  "${SITE}/pulsar_mouse/drivers/"

          # Desktop file + icon
          cp data/pulsar-mouse.desktop "${APPDIR}/pulsar-mouse.desktop"
          cp data/pulsar-mouse.png "${APPDIR}/pulsar-mouse.png"

          # AppRun
          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export PYTHONHOME="${HERE}/usr"

          # Add system site-packages so gi (PyGObject), dbus, etc. are found
          for d in /usr/lib/python3/dist-packages \
                   /usr/lib/python3.*/dist-packages \
                   /usr/lib64/python3.*/site-packages; do
              [ -d "$d" ] && PYTHONPATH="${PYTHONPATH:+${PYTHONPATH}:}${d}"
          done
          export PYTHONPATH

          if [ "$1" = "--cli" ]; then
              shift
              exec "${HERE}/usr/bin/python3" -m pulsar_mouse.cli "$@"
          else
              exec "${HERE}/usr/bin/python3" -m pulsar_mouse.gui "$@"
          fi
          APPRUN
          chmod 755 "${APPDIR}/AppRun"

          # Download appimagetool
          curl -sL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          ARCH=x86_64 ./appimagetool --no-appstream "${APPDIR}" \
            "pulsar-mouse-linux-${VERSION}-x86_64.AppImage"

      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: "*.AppImage"

  release-notes:
    name: Generate release notes
    runs-on: ubuntu-24.04
    needs: [build-deb, build-tarball, build-rpm, build-appimage]

    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
